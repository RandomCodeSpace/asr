# App-level config for the incident-management example.
#
# Carries the cross-cutting framework knobs (similarity thresholds,
# confidence threshold, escalation roster, severity aliases, dedup
# system prompt) directly under ``framework:`` so the runtime can read
# them via ``AppConfig.framework`` without resolving an app-side
# provider callable. ``environments`` and ``dedup`` are top-level for
# the same reason.

store_path: incidents
similarity_method: keyword

# Generic terminal-tool registry. Apps declare which tool calls
# transition the session to which status, plus optional per-rule
# extra-field extraction. Replaces the v1.0 hardcoded
# ``_TERMINAL_TOOL_RULES`` table in ``orchestrator.py`` (Phase 6 /
# DECOUPLE-02 / DECOUPLE-03 / D-06-01..06).
orchestrator:
  entry_agent: intake
  default_terminal_status: needs_review
  statuses:
    open:
      name: open
      terminal: false
      kind: pending
    escalated:
      name: escalated
      terminal: true
      kind: escalation
    resolved:
      name: resolved
      terminal: true
      kind: success
    needs_review:
      name: needs_review
      terminal: true
      kind: needs_review
  terminal_tools:
    - tool_name: mark_resolved
      status: resolved
    - tool_name: mark_escalated
      status: escalated
      extract_fields:
        team:
          - args.team
          - result.team
    - tool_name: notify_oncall
      status: escalated
      extract_fields:
        team:
          - args.team
  # Tools whose ``args.patch`` blob the harvester folds into agent
  # confidence/signal/rationale (DECOUPLE-02 generalization).
  patch_tools:
    - update_incident
  # Tools the harvester treats as typed-terminal for confidence
  # capture but the orchestrator's finalize path does NOT transition
  # status on (the deep_investigator's hypothesis tool is a stage-
  # complete signal, not a session-end signal).
  harvest_terminal_tools:
    - submit_hypothesis
  # App-MCP-server discovery (Phase 7 / DECOUPLE-04 / D-07-02). Each
  # entry is a dotted module path imported at orchestrator boot; each
  # module exposes ``register(mcp_app, cfg)``. Replaces the v1.0
  # hardcoded framework-internal MCP-server imports + setter calls.
  mcp_servers:
    - examples.incident_management.mcp_servers.observability
    - examples.incident_management.mcp_servers.remediation
    - examples.incident_management.mcp_servers.user_context
  # Parameterized escalate path (Resolution A — Option B).
  escalate_action_tool_name: notify_oncall
  escalate_action_default_team: platform-oncall

# Cross-cutting framework knobs the runtime consumes directly.
framework:
  # Per-app session-id prefix. Threaded through SessionStore into
  # Session.id_format so this app's rows look like INC-YYYYMMDD-NNN.
  session_id_prefix: INC
  confidence_threshold: 0.75
  similarity_threshold: 0.2
  escalation_teams:
    - platform-oncall
    - data-oncall
    - security-oncall
  severity_aliases:
    sev1: high
    sev2: high
    p1: high
    p2: high
    critical: high
    urgent: high
    high: high
    sev3: medium
    p3: medium
    moderate: medium
    medium: medium
    sev4: low
    p4: low
    info: low
    informational: low
    low: low
  dedup_system_prompt: >-
    You are deduplicating incident reports for an SRE platform. Two
    reports are duplicates only if they describe the same root cause
    AND the same service/environment AND overlap in time-of-occurrence.
    Surface-level keyword overlap is NOT enough. Respond with a single
    JSON object matching this schema: {"is_duplicate": bool,
    "confidence": float in [0,1], "rationale": "1-2 sentences"}.

environments:
  - production
  - staging
  - dev
  - local

# P7-C: two-stage dedup pipeline. The example app opts in here; the
# framework default (no `dedup` key) is off.
dedup:
  enabled: true
  stage1_threshold: 0.6
  stage1_top_k: 5
  stage2_top_k: 3
  stage2_model: cheap
  stage2_min_confidence: 0.7
  run_at: post_intake
  scope:
    same_environment: true
    only_closed: true

# UI rendering knobs surfaced to the generic runtime/ui.py shell. Keys
# under `badges` are field names on the session; values map field-value
# -> {label, color}. `detail_fields` lists fields the detail pane
# renders, in order. `tags` is an opaque key->tag-string map for
# cross-skill signals.
ui:
  badges:
    severity:
      sev1: { label: SEV1, color: red }
      sev2: { label: SEV2, color: orange }
      sev3: { label: SEV3, color: yellow }
      sev4: { label: SEV4, color: blue }
      sev5: { label: SEV5, color: gray }
  detail_fields:
    - { key: reporter.id, label: Reporter, section: summary }
    - { key: reporter.team, label: Team, section: summary }
    - { key: component_id, label: Component, section: summary }
  tags:
    prior_match_supported: hypothesis:prior_match_supported
    prior_match_rejected: hypothesis:prior_match_rejected
