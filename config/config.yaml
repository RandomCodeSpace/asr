storage:
  metadata:
    url: "sqlite:////tmp/asr.db"
  vector:
    backend: faiss
    path: "/tmp/asr-faiss"
    collection_name: "incidents"
    distance_strategy: cosine
llm:
  default: gpt_oss
  providers:
    ollama_cloud:
      kind: ollama
      base_url: https://ollama.com
      api_key: ${OLLAMA_API_KEY}
    ollama_local:
      kind: ollama
      base_url: http://localhost:11434
    azure:
      kind: azure_openai
      endpoint: ${AZURE_ENDPOINT}
      api_version: 2024-08-01-preview
      api_key: ${AZURE_OPENAI_KEY}
    openrouter:
      kind: openai_compat
      base_url: https://openrouter.ai/api/v1
      api_key: ${OPENROUTER_API_KEY}
  models:
    workhorse:
      provider: openrouter
      model: openai/gpt-4o-mini
      temperature: 0.0
    cheap:
      provider: ollama_cloud
      model: gpt-oss:20b
      temperature: 0.2
    smart:
      provider: azure
      model: gpt-4o
      deployment: gpt-4o
      temperature: 0.0
    # M8 (Ollama-via-LangChain proof point): every agent picks its
    # model independently. ``gpt_oss`` / ``gpt_oss_cheap`` route to
    # Ollama Cloud's open-weight gpt-oss model; swap an agent's
    # ``model:`` field to one of these to run that agent on Ollama
    # while leaving other agents on OpenRouter / Azure / etc.
    gpt_oss:
      provider: ollama_cloud
      model: gpt-oss:20b
      temperature: 0.0
    gpt_oss_cheap:
      provider: ollama_cloud
      model: gpt-oss:20b
      temperature: 0.4
  embedding:
    provider: ollama_local
    model: bge-m3
    dim: 1024
mcp:
  servers:
  - name: local_inc
    transport: in_process
    module: examples.incident_management.mcp_server
    category: incident_management
  - name: local_observability
    transport: in_process
    module: examples.incident_management.mcp_servers.observability
    category: observability
  - name: local_remediation
    transport: in_process
    module: examples.incident_management.mcp_servers.remediation
    category: remediation
  - name: local_user_context
    transport: in_process
    module: examples.incident_management.mcp_servers.user_context
    category: user_context
  - name: external_ticketing
    transport: http
    url: ${EXTERNAL_MCP_URL}
    headers:
      Authorization: Bearer ${EXT_TOKEN}
    category: ticketing
    enabled: false
paths:
  skills_dir: examples/incident_management/skills
  incidents_dir: incidents

# Cross-cutting framework knobs the runtime reads off
# ``AppConfig.framework`` directly. Mirrors what
# ``config/incident_management.yaml`` carries — kept here so the
# bundled deployment config is self-contained.
framework:
  # Per-app session-id prefix. Threaded through SessionStore into
  # Session.id_format so this app's rows look like INC-YYYYMMDD-NNN.
  session_id_prefix: INC
  confidence_threshold: 0.75
  similarity_threshold: 0.2
  escalation_teams:
    - platform-oncall
    - data-oncall
    - security-oncall
  severity_aliases:
    sev1: high
    sev2: high
    p1: high
    p2: high
    critical: high
    urgent: high
    high: high
    sev3: medium
    p3: medium
    moderate: medium
    medium: medium
    sev4: low
    p4: low
    info: low
    informational: low
    low: low
  dedup_system_prompt: >-
    You are deduplicating incident reports for an SRE platform. Two
    reports are duplicates only if they describe the same root cause
    AND the same service/environment AND overlap in time-of-occurrence.
    Surface-level keyword overlap is NOT enough. Respond with a single
    JSON object matching this schema: {"is_duplicate": bool,
    "confidence": float in [0,1], "rationale": "1-2 sentences"}.

# Environments roster surfaced on the UI selector and GET /environments.
environments:
  - production
  - staging
  - dev
  - local

# Two-stage dedup pipeline. Apps that don't want it omit the block.
dedup:
  enabled: true
  stage1_threshold: 0.6
  stage1_top_k: 5
  stage2_top_k: 3
  stage2_model: cheap
  stage2_min_confidence: 0.7
  run_at: post_intake
  scope:
    same_environment: true
    only_closed: true

# Generic terminal-tool registry. Apps declare which tool calls
# transition the session to which status, plus optional per-rule
# extra-field extraction. Replaces the v1.0 hardcoded
# ``_TERMINAL_TOOL_RULES`` table in ``orchestrator.py`` (Phase 6 /
# DECOUPLE-02 / DECOUPLE-03 / D-06-01..06). Mirrors
# ``incident_management.yaml`` since this is the bundled deployment
# config for the example app.
orchestrator:
  # Phase 11 (FOC-04): declarative HITL gating policy. Framework
  # default (threshold 0.7) -- mirrors incident_management v1.1
  # behaviour with the production-class environment gate.
  gate_policy:
    confidence_threshold: 0.7
    gated_environments: [production]
    gated_risk_actions: [approve]
  # Phase 12 (FOC-05): declarative retry policy. Framework default --
  # max_retries=2, transient retries on, confidence floor 0.4.
  retry_policy:
    max_retries: 2
    retry_on_transient: true
    retry_low_confidence_threshold: 0.4
  entry_agent: intake
  default_terminal_status: needs_review
  statuses:
    open:
      name: open
      terminal: false
      kind: pending
    escalated:
      name: escalated
      terminal: true
      kind: escalation
    resolved:
      name: resolved
      terminal: true
      kind: success
    needs_review:
      name: needs_review
      terminal: true
      kind: needs_review
  terminal_tools:
    - tool_name: mark_resolved
      status: resolved
    - tool_name: mark_escalated
      status: escalated
      extract_fields:
        team:
          - args.team
          - result.team
    - tool_name: notify_oncall
      status: escalated
      extract_fields:
        team:
          - args.team
  patch_tools:
    - update_incident
  harvest_terminal_tools:
    - submit_hypothesis
  # App-MCP-server discovery (Phase 7 / DECOUPLE-04 / D-07-02). Each
  # entry is a dotted module path imported at orchestrator boot; each
  # module exposes ``register(mcp_app, cfg)``. Replaces the v1.0
  # hardcoded framework-internal MCP-server imports + setter calls.
  mcp_servers:
    - examples.incident_management.mcp_servers.observability
    - examples.incident_management.mcp_servers.remediation
    - examples.incident_management.mcp_servers.user_context
  escalate_action_tool_name: notify_oncall
  escalate_action_default_team: platform-oncall
  # DECOUPLE-05 / D-08-01: app-declared pydantic schema for
  # state_overrides; orchestrator validates the start_session
  # kwarg against this class.
  state_overrides_schema: examples.incident_management.state.IncidentStateOverrides
  # Phase 9 (D-09-02 / FOC-01 / FOC-02): session-derived tool-arg
  # injection map. Strips the named args from each tool's LLM-visible
  # signature and re-supplies them from the live Session at invocation
  # time. Mirrors incident_management.yaml since this file is the
  # bundled deployment config for the example app.
  injected_args:
    environment: session.extra_fields.environment
    incident_id: session.id
    session_id: session.id
runtime:
  # Wires the orchestrator and storage layer to the incident-management
  # domain state class (see examples/incident_management/state.py).
  # Apps swapping in a different state class point this at their own
  # ``Session`` subclass.
  state_class: null  # bare runtime.state.Session — app data in extra_fields
  # Risk-rated tool gateway with prod-HITL override.
  # ``policy`` declares per-tool risk tiers; tools absent default to ``low``.
  # ``prod_overrides`` forces ``require-approval`` regardless of the tier
  # whenever the live session's environment is in ``prod_environments``
  # AND the tool matches a ``resolution_trigger_tools`` glob. The override
  # only TIGHTENS — it can never relax a higher-risk tool to ``auto``.
  gateway:
    policy:
      # Tool-name lookups try the server-prefixed (``<server>:<tool>``)
      # AND bare forms — config can use either. Bare names below are
      # easier to keep aligned with the MCP source.
      update_incident: medium
      apply_fix: high
    prod_overrides:
      prod_environments:
        - production
      # Tools that ALWAYS require human approval in production. ``apply_fix``
      # is the only currently-implemented remediation; ``update_incident``
      # gates resolution closures (status: resolved/escalated). Globs are
      # matched against the prefixed and bare forms.
      resolution_trigger_tools:
        - update_incident
        - apply_fix
