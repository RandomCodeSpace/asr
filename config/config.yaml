storage:
  url: "sqlite:///incidents/incidents.db"
llm:
  default: workhorse
  providers:
    ollama_cloud:
      kind: ollama
      base_url: https://ollama.com
      api_key: ${OLLAMA_API_KEY}
    azure:
      kind: azure_openai
      endpoint: ${AZURE_ENDPOINT}
      api_version: 2024-08-01-preview
      api_key: ${AZURE_OPENAI_KEY}
  models:
    workhorse:
      provider: ollama_cloud
      model: gpt-oss:120b
      temperature: 0.0
    cheap:
      provider: ollama_cloud
      model: gpt-oss:20b
      temperature: 0.2
    smart:
      provider: azure
      model: gpt-4o
      deployment: gpt-4o
      temperature: 0.0
  embedding:
    provider: ollama_cloud
    model: nomic-embed-text
mcp:
  servers:
  - name: local_inc
    transport: in_process
    module: orchestrator.mcp_servers.incident
    category: incident_management
  - name: local_observability
    transport: in_process
    module: orchestrator.mcp_servers.observability
    category: observability
  - name: local_remediation
    transport: in_process
    module: orchestrator.mcp_servers.remediation
    category: remediation
  - name: local_user_context
    transport: in_process
    module: orchestrator.mcp_servers.user_context
    category: user_context
  - name: external_ticketing
    transport: http
    url: ${EXTERNAL_MCP_URL}
    headers:
      Authorization: Bearer ${EXT_TOKEN}
    category: ticketing
    enabled: false
environments:
- production
- staging
- dev
- local
incidents:
  store_path: incidents
  similarity_threshold: 0.2
  similarity_method: keyword
paths:
  skills_dir: config/skills
  incidents_dir: incidents
intervention:
  confidence_threshold: 0.75
  escalation_teams:
  - platform-oncall
  - data-oncall
  - security-oncall
orchestrator:
  entry_agent: intake
