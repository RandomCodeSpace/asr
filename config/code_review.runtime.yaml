# Framework-runtime config for the code-review example app.
#
# Mirrors config/config.yaml but points the provider hooks at
# examples.code_review.config:* so a code-review deployment never
# resolves to the incident-management framework defaults.
#
# This file is illustrative — the bundled dist/apps/code-review.py
# ships with these providers compiled in. The Streamlit UI under
# examples/code_review/ui.py loads its AppConfig via the same
# load_config(...) the incident UI uses.
storage:
  metadata:
    url: "sqlite:///code_reviews/code_reviews.db"
  vector:
    backend: faiss
    path: "code_reviews/faiss"
    collection_name: "code_reviews"
    distance_strategy: cosine
llm:
  default: stub_default
  providers:
    stub:
      kind: stub
  models:
    stub_default:
      provider: stub
      model: stub-1
mcp:
  servers:
  - name: local_cr
    transport: in_process
    module: examples.code_review.mcp_server
    category: code_review
paths:
  skills_dir: examples/code_review/skills
  incidents_dir: code_reviews
# Phase 6 placeholder: code_review's full terminal-tool registration
# ships in Phase 8 (DECOUPLE-07 + DECOUPLE-05) alongside the e2e
# test. For now the framework knows the app's status vocabulary
# but has no rules to fire on — every code_review session finalizes
# to ``unreviewed`` (the app's app-owned default per D-06-06).
orchestrator:
  entry_agent: intake
  default_terminal_status: unreviewed
  statuses:
    in_review:
      name: in_review
      terminal: false
      kind: pending
    unreviewed:
      name: unreviewed
      terminal: true
      kind: needs_review
  terminal_tools: []
  # App-MCP-server discovery (Phase 7 / DECOUPLE-04 / D-07-02). Empty
  # list = code-review boots without app-owned MCP servers; framework
  # treats the empty branch gracefully (the orchestrator's discovery
  # loop simply iterates zero times). Phase 8 may populate this for
  # code-review-specific tools.
  mcp_servers: []
# Cross-cutting framework knobs read directly off AppConfig.framework.
framework:
  # Per-app session-id prefix. Threaded through SessionStore into
  # Session.id_format so this app's rows look like REVIEW-YYYYMMDD-NNN
  # — disjoint from the incident-management ``INC-`` namespace.
  session_id_prefix: REVIEW
  confidence_threshold: 0.7
  similarity_threshold: 0.3
  escalation_teams: []
  severity_aliases:
    info: info
    warning: warning
    warn: warning
    error: error
    err: error
    critical: critical
    crit: critical
    blocker: critical
  dedup_system_prompt: >-
    You are deduplicating pull-request reviews. Two reviews are
    duplicates only if they cover the same repository, the same
    branch/commit range, and surface overlapping findings. Return a
    single JSON object: {"is_duplicate": bool, "confidence":
    float in [0,1], "rationale": "1-2 sentences"}.

runtime:
  state_class: null  # bare runtime.state.Session — app data in extra_fields
