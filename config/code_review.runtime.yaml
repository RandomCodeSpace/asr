# Framework-runtime config for the code-review example app.
#
# Mirrors config/config.yaml but points the provider hooks at
# examples.code_review.config:* so a code-review deployment never
# resolves to the incident-management framework defaults.
#
# This file is illustrative — the bundled dist/apps/code-review.py
# ships with these providers compiled in. The Streamlit UI under
# examples/code_review/ui.py loads its AppConfig via the same
# load_config(...) the incident UI uses.
storage:
  metadata:
    url: "sqlite:///code_reviews/code_reviews.db"
  vector:
    backend: faiss
    path: "code_reviews/faiss"
    collection_name: "code_reviews"
    distance_strategy: cosine
llm:
  default: stub_default
  providers:
    stub:
      kind: stub
  models:
    stub_default:
      provider: stub
      model: stub-1
mcp:
  servers:
  - name: local_cr
    transport: in_process
    module: examples.code_review.mcp_server
    category: code_review
paths:
  skills_dir: examples/code_review/skills
  incidents_dir: code_reviews
orchestrator:
  entry_agent: intake
# Cross-cutting framework knobs read directly off AppConfig.framework.
framework:
  confidence_threshold: 0.7
  similarity_threshold: 0.3
  escalation_teams: []
  severity_aliases:
    info: info
    warning: warning
    warn: warning
    error: error
    err: error
    critical: critical
    crit: critical
    blocker: critical
  dedup_system_prompt: >-
    You are deduplicating pull-request reviews. Two reviews are
    duplicates only if they cover the same repository, the same
    branch/commit range, and surface overlapping findings. Return a
    single JSON object: {"is_duplicate": bool, "confidence":
    float in [0,1], "rationale": "1-2 sentences"}.

runtime:
  state_class: null  # bare runtime.state.Session — app data in extra_fields
