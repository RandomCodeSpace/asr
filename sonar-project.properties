sonar.projectKey=RandomCodeSpace_asr
# Organization slug — verify on SonarCloud (https://sonarcloud.io); typically the
# lowercased GitHub org. If first CI run fails with "organization not found",
# update this value to match what SonarCloud assigns.
sonar.organization=randomcodespace

sonar.sources=src/orchestrator
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit.xml
sonar.python.version=3.11

# Generated bundle (built from src/) and ad-hoc scripts are excluded from
# Sonar — quality gates apply to the source tree, not the build artefact.
sonar.exclusions=dist/**,scripts/**,docs/**
sonar.test.exclusions=tests/fixtures/**

# Coverage exclusions — apply to source paths only, not test paths.
sonar.coverage.exclusions=src/orchestrator/__init__.py
