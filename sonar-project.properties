sonar.projectKey=RandomCodeSpace_asr
sonar.organization=randomcodespace

# Source code we want analysed
sonar.sources=src/runtime,examples
sonar.tests=tests

# Coverage and test reports
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit.xml
sonar.python.version=3.11

# Exclude generated/build/utility paths
sonar.exclusions=dist/**,scripts/**,docs/**,.venv/**,incidents/**
sonar.test.exclusions=tests/fixtures/**

# Copy-Paste Detection exclusions. ``runtime/tools/gateway.py`` carries
# a deliberate sync (``_run``) + async (``_arun``) mirror — every
# ``BaseTool`` must support both invocation styles. The sibling blocks
# look like duplication to CPD but are an architectural requirement,
# not drift; modifying them in tandem is the project convention.
sonar.cpd.exclusions=src/runtime/tools/gateway.py

# Coverage exclusions — UI is excluded because Streamlit rendering is exercised
# manually in a browser, not by the unit-test suite. Coverage gates apply to
# the framework core (src/runtime/) only.
sonar.coverage.exclusions=src/runtime/__init__.py,examples/**/ui.py,ui/**

# Suppress python:S7503 (async-without-await) for framework-driven async signatures.
# LangGraph nodes and FastMCP tool handlers MUST be `async def` even when their
# bodies are synchronous — removing async breaks the framework contract.
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e1.resourceKey=src/runtime/mcp_servers/**/*.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e2.resourceKey=src/runtime/graph.py
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e3.resourceKey=examples/**/mcp_server.py
