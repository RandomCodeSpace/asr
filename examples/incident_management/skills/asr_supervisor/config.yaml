description: ASR investigation supervisor — hydrates L2/L5/L7 memory, gates duplicate investigations, dispatches to triage
kind: supervisor
subordinates:
  - triage
dispatch_strategy: rule
# The runner runs FIRST on every supervisor entry. It hydrates the
# L2 / L5 / L7 memory layers onto ``IncidentState.memory`` and
# applies the single-active-investigation gate. When the gate fires
# the runner short-circuits to ``__end__`` (status="duplicate",
# parent_session_id stamped) without consulting the dispatch table.
# When the runner returns a non-terminal patch the dispatch_rules
# below apply — every fresh session lands on triage.
runner: examples.incident_management.asr.supervisor_node:default_supervisor_runner
dispatch_rules:
  - when: "True"
    target: triage
max_dispatch_depth: 2
