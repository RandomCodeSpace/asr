description: Close the INC via mark_resolved or escalate via mark_escalated.
kind: responsive
tools:
  local: ["propose_fix", "apply_fix", "update_incident", "mark_resolved", "mark_escalated"]
routes:
  - when: success
    next: __end__
  - when: failed
    next: __end__
  - when: default
    next: __end__
